# ============================================================
# services.yaml — Freiberufliches Angebot. EN/DE nebeneinander.
# ============================================================

intro:
  en: >-
    I work with organizations that want to understand how people actually
    decide — and how to design technology, products, and AI systems
    accordingly.
  de: >-
    Ich arbeite mit Organisationen, die verstehen wollen, wie Menschen
    tatsächlich entscheiden — und wie man Technologie, Produkte und
    KI-Systeme entsprechend gestaltet.

services:
  - id: keynotes
    title:
      en: Keynotes & Talks
      de: Keynotes & Vorträge
    description:
      en: >-
        Evidence-based talks on behavioral design, digital nudging, and how
        AI shapes human decision-making — engaging for executive audiences,
        grounded in current research.
      de: >-
        Evidenzbasierte Vorträge zu Behavioral Design, digitalem Nudging und
        dem Einfluss von KI auf menschliches Entscheiden — zugänglich für
        Führungskräfte, fundiert in aktueller Forschung.

  - id: workshops
    title:
      en: Workshops & Executive Education
      de: Workshops & Executive Education
    description:
      en: >-
        Hands-on formats on design thinking, behavioral design, and working
        with AI — from half-day sessions to multi-day executive programs.
      de: >-
        Praxisformate zu Design Thinking, Behavioral Design und dem Arbeiten
        mit KI — vom Halbtages-Workshop bis zum mehrtägigen
        Executive-Programm.

  - id: coaching
    title:
      en: Executive Coaching
      de: Executive Coaching
    description:
      en: >-
        Coaching for individuals and teams — psychologically grounded
        (trained psychologist, systemic approach), strictly confidential,
        and focused on what actually shifts behavior: patterns, context, and
        small experiments between sessions.
      de: >-
        Coaching für Einzelpersonen und Teams — psychologisch fundiert
        (Psychologe, systemischer Ansatz), streng vertraulich und fokussiert
        auf das, was Verhalten wirklich verändert: Muster, Kontext und kleine
        Experimente zwischen den Sitzungen.

  - id: advisory
    title:
      en: Advisory
      de: Beratung
    description:
      en: >-
        Scientific advice for teams building products that change behavior:
        intervention design, choice architecture reviews, and rigorous
        evaluation — including field experiments.
      de: >-
        Wissenschaftliche Begleitung für Teams, deren Produkte Verhalten
        verändern sollen: Interventionsdesign, Review von
        Entscheidungsarchitekturen und saubere Evaluation — bis hin zum
        Feldexperiment.

