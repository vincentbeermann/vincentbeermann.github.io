intro:
  en: >-
    I work with organizations that want to understand how people actually
    decide — and how to design technology, products, and AI systems
    accordingly. Everything here I do personally, as a psychologist and
    researcher.
  de: >-
    Ich arbeite mit Organisationen, die verstehen wollen, wie Menschen
    tatsächlich entscheiden — und wie man Technologie, Produkte und
    KI-Systeme entsprechend gestaltet. Alles hier halte ich persönlich, als
    Psychologe und Wissenschaftler.

services:
  - id: keynotes
    title:
      en: Keynotes & Talks
      de: Keynotes & Vorträge
    description:
      en: >-
        Evidence-based talks on behavioral design, digital nudging, and how
        AI shapes human decision-making — drawn from my own research and the
        current literature, made accessible for executive audiences.
      de: >-
        Evidenzbasierte Vorträge zu Behavioral Design, digitalem Nudging und
        dem Einfluss von KI auf menschliches Entscheiden — aus der eigenen
        Forschung und der aktuellen Literatur, zugänglich für Führungskräfte.

  - id: workshops
    title:
      en: Workshops & Executive Education
      de: Workshops & Executive Education
    description:
      en: >-
        Teaching for practitioners: design thinking, behavioral design, and
        working with AI — from half-day sessions to multi-day executive
        programs, each with its own curriculum, defined learning objectives,
        and material I write myself. Most recently in the Executive MBA at
        the University of St. Gallen.
      de: >-
        Lehre für die Praxis: Design Thinking, Behavioral Design und das
        Arbeiten mit KI — vom Halbtages-Workshop bis zum mehrtägigen
        Executive-Programm, jeweils mit eigenem Curriculum, definierten
        Lernzielen und selbst geschriebenem Material. Zuletzt im Executive
        MBA der Universität St. Gallen.

  - id: coaching
    title:
      en: Executive Coaching
      de: Executive Coaching
    description:
      en: >-
        Coaching for individuals and teams, grounded in psychology: I am a
        psychologist (M.Sc.) and behavioral researcher, and I work from what
        the evidence says about how people change — patterns, context, and
        what a situation makes easy or hard. Strictly confidential. Not
        therapy, not life coaching.
      de: >-
        Coaching für Einzelpersonen und Teams, psychologisch fundiert: Ich
        bin Psychologe (M.Sc.) und Verhaltensforscher und arbeite mit dem,
        was die Evidenz über Veränderung hergibt — Muster, Kontext und die
        Frage, was eine Situation leicht oder schwer macht. Streng
        vertraulich. Keine Therapie, kein Life-Coaching.

  - id: advisory
    title:
      en: Advisory
      de: Beratung
    description:
      en: >-
        Scientific advice for teams whose products change behavior:
        intervention design grounded in the literature, choice architecture
        reviews, and rigorous evaluation — up to preregistered field
        experiments.
      de: >-
        Wissenschaftliche Begleitung für Teams, deren Produkte Verhalten
        verändern sollen: Interventionsdesign auf Basis der Literatur, Review
        von Entscheidungsarchitekturen und saubere Evaluation — bis hin zum
        präregistrierten Feldexperiment.

